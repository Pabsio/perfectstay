name: PerfectStay Scraper

on:
  schedule:
    - cron: "30 7,11,16 * * 1-5"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install requests flask google-genai

      - name: Run scraper (all markets)
        run: python scraper.py --market ES,FR,IT

      - name: Build static HTML
        run: python build.py

      - name: Commit DB
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add perfectstay.db docs/index.html
          git diff --staged --quiet || git commit -m "chore: scrape $(date +'%Y-%m-%d %H:%M')"
          git push

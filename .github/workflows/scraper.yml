name: PerfectStay Scraper

on:
  schedule:
    # 3 veces al día lunes-viernes (hora España)
    - cron: "30 7,11,16 * * 1-5"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install requests flask

      - name: Run scraper (aeropuertos principales)
        run: python scraper.py --main-only

      - name: Commit DB
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add perfectstay.db
          git diff --staged --quiet || git commit -m "chore: perfectstay scrape $(date +'%Y-%m-%d %H:%M')"
          git push

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ViajerosPiratas · Dashboard de Precios</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #f0f4f8;
      --surface: #ffffff;
      --border:  #e2e8f0;
      --text:    #1a202c;
      --muted:   #64748b;
      --primary: #7c3aed;
      --primary-l: #ede9fe;
      --green:   #16a34a;
      --green-l: #dcfce7;
      --red:     #dc2626;
      --red-l:   #fee2e2;
      --yellow:  #ca8a04;
      --radius:  10px;
      --shadow:  0 1px 3px rgba(0,0,0,.08);
      --shadow-md: 0 4px 12px rgba(0,0,0,.12);
    }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }
    a { color: var(--primary); text-decoration: none; }
    button { cursor: pointer; font: inherit; border: none; }

    .topbar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow);
    }
    .topbar h1 { font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .main { display: flex; height: calc(100vh - 56px); overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: 250px; min-width: 250px; background: var(--surface);
      border-right: 1px solid var(--border); overflow-y: auto;
      padding: 16px; display: flex; flex-direction: column; gap: 12px;
    }
    .sidebar h2 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
    .filter-group { display: flex; flex-direction: column; gap: 5px; }
    .filter-group label { font-size: 12px; color: var(--muted); font-weight: 500; }
    .filter-group select,
    .filter-group input { width: 100%; padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); font: inherit; font-size: 13px; outline: none; }
    .filter-group select:focus, .filter-group input:focus { border-color: var(--primary); }
    .price-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .btn-reset { width: 100%; padding: 8px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-size: 13px; margin-top: auto; }
    .btn-reset:hover { background: var(--red-l); border-color: var(--red); color: var(--red); }

    /* ── Content ── */
    .content { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }

    /* ── Stats ── */
    .stats-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; box-shadow: var(--shadow); }
    .stat-card .label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
    .stat-card .value { font-size: 26px; font-weight: 700; margin-top: 4px; }
    .stat-card.purple .value { color: var(--primary); }
    .stat-card.green .value  { color: var(--green); }

    /* ── Toolbar ── */
    .toolbar { display: flex; align-items: center; gap: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; box-shadow: var(--shadow); }
    .toolbar .search-wrap { flex: 1; position: relative; }
    .toolbar .search-wrap input { width: 100%; padding: 8px 12px 8px 34px; border: 1px solid var(--border); border-radius: 6px; font: inherit; font-size: 13px; background: var(--bg); outline: none; }
    .toolbar .search-wrap input:focus { border-color: var(--primary); }
    .toolbar .icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); }
    .toolbar select { padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px; font: inherit; font-size: 13px; background: var(--bg); outline: none; }
    .result-count { font-size: 13px; color: var(--muted); white-space: nowrap; }

    /* ── Grid ── */
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 14px; }

    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden; box-shadow: var(--shadow); transition: box-shadow .2s, transform .2s;
      display: flex; flex-direction: column;
    }
    .card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }

    .card-img { height: 160px; background: var(--bg); overflow: hidden; position: relative; }
    .card-img img { width: 100%; height: 100%; object-fit: cover; }
    .card-img .stars { position: absolute; bottom: 8px; left: 8px; background: rgba(0,0,0,.5); color: #fbbf24; padding: 2px 7px; border-radius: 4px; font-size: 12px; font-weight: 600; }
    .card-img .ta-badge { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,.5); color: white; padding: 2px 7px; border-radius: 4px; font-size: 11px; }

    .card-body { padding: 12px 14px; flex: 1; display: flex; flex-direction: column; gap: 5px; }
    .card-name { font-size: 14px; font-weight: 700; line-height: 1.3; }
    .card-dest { font-size: 12px; color: var(--muted); }
    .card-topics { display: flex; flex-wrap: wrap; gap: 4px; }
    .topic { font-size: 11px; padding: 2px 7px; background: var(--primary-l); color: var(--primary); border-radius: 4px; }

    .card-footer { padding: 10px 14px 12px; border-top: 1px solid var(--border); display: flex; align-items: flex-end; justify-content: space-between; }
    .price-block .desde { font-size: 11px; color: var(--muted); }
    .price-main { font-size: 24px; font-weight: 800; }
    .price-sub { font-size: 11px; color: var(--muted); }
    .card-btn { padding: 7px 12px; background: var(--primary); color: white; border-radius: 6px; font-size: 12px; font-weight: 600; white-space: nowrap; }
    .card-btn:hover { background: #6d28d9; text-decoration: none; }
    .cal-btn { padding: 5px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; font-size: 12px; color: var(--muted); margin-right: 6px; }
    .cal-btn:hover { border-color: var(--primary); color: var(--primary); }

    /* ── Modal calendario ── */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border-radius: var(--radius); padding: 24px; width: 90%; max-width: 720px; max-height: 80vh; overflow-y: auto; box-shadow: var(--shadow-md); }
    .modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .modal-sub { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
    .modal-controls { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .modal-controls select { padding: 6px 10px; border: 1px solid var(--border); border-radius: 6px; font: inherit; font-size: 13px; background: var(--bg); outline: none; }
    .modal-close { float: right; background: none; font-size: 20px; color: var(--muted); line-height: 1; }

    /* Calendario de precios */
    .cal-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 6px; }
    .cal-cell {
      border-radius: 6px; padding: 8px; text-align: center; font-size: 12px;
      border: 1px solid var(--border); background: var(--bg);
    }
    .cal-cell .date { font-weight: 600; margin-bottom: 2px; }
    .cal-cell .price { font-size: 15px; font-weight: 800; }
    .cal-cell .nights { font-size: 10px; color: var(--muted); }
    .cal-cell.cheap { background: var(--green-l); border-color: #86efac; }
    .cal-cell.cheap .price { color: var(--green); }
    .cal-cell.mid { background: #fefce8; border-color: #fde047; }
    .cal-cell.mid .price { color: var(--yellow); }
    .cal-cell.expensive { background: var(--red-l); border-color: #fca5a5; }
    .cal-cell.expensive .price { color: var(--red); }

    /* ── Pagination ── */
    .pagination { display: flex; align-items: center; justify-content: center; gap: 6px; }
    .pagination button { padding: 6px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--surface); font-size: 13px; }
    .pagination button:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); }
    .pagination button.active { background: var(--primary); color: white; border-color: var(--primary); }
    .pagination button:disabled { opacity: .4; cursor: not-allowed; }

    .empty { text-align: center; padding: 60px; color: var(--muted); }
    .empty .icon { font-size: 48px; margin-bottom: 12px; }
    .loading { text-align: center; padding: 40px; color: var(--muted); }
    .spinner { display: inline-block; width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="topbar">
  <h1>🏴‍☠️ ViajerosPiratas · Dashboard de Precios</h1>
  <div style="display:flex;gap:10px;align-items:center">
    <span id="last-update" style="font-size:12px;color:var(--muted)"></span>
    <button onclick="loadAll()" style="padding:7px 14px;background:var(--primary);color:white;border-radius:6px;font-size:13px;font-weight:600;">🔄 Refrescar</button>
  </div>
</div>

<div class="main">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h2>Filtros</h2>

    <div class="filter-group">
      <label>Aeropuerto salida</label>
      <select id="f-origen" onchange="loadProducts()">
        <option value="">Todos los orígenes</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Noches</label>
      <select id="f-noches" onchange="loadProducts()">
        <option value="">Cualquiera</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Régimen</label>
      <select id="f-pension" onchange="loadProducts()">
        <option value="">Todos</option>
      </select>
    </div>

    <div class="filter-group">
      <label>País destino</label>
      <select id="f-pais" onchange="loadProducts()">
        <option value="">Todos</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Región</label>
      <select id="f-region" onchange="loadProducts()">
        <option value="">Todas</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Estrellas</label>
      <select id="f-estrellas" onchange="loadProducts()">
        <option value="">Todas</option>
      </select>
    </div>

    <div class="filter-group">
      <label>Precio €/persona</label>
      <div class="price-row">
        <input type="number" id="f-precio_min" placeholder="Mín" oninput="debounce()">
        <input type="number" id="f-precio_max" placeholder="Máx" oninput="debounce()">
      </div>
    </div>

    <div class="filter-group">
      <label>Fecha salida desde</label>
      <input type="date" id="f-fecha_desde" onchange="loadProducts()">
    </div>
    <div class="filter-group">
      <label>Fecha salida hasta</label>
      <input type="date" id="f-fecha_hasta" onchange="loadProducts()">
    </div>

    <button class="btn-reset" onclick="resetFilters()">✕ Limpiar</button>
  </aside>

  <!-- CONTENT -->
  <main class="content">
    <div class="stats-bar" id="stats-bar">
      <div class="stat-card purple"><div class="label">Hoteles activos</div><div class="value" id="st-hoteles">…</div></div>
      <div class="stat-card"><div class="label">Precios en DB</div><div class="value" id="st-precios">…</div></div>
      <div class="stat-card green"><div class="label">Precio mínimo</div><div class="value" id="st-min">…</div></div>
      <div class="stat-card"><div class="label">Precio medio</div><div class="value" id="st-med">…</div></div>
    </div>

    <div class="toolbar">
      <div class="search-wrap">
        <span class="icon">🔍</span>
        <input type="text" id="t-search" placeholder="Hotel, destino, país…" oninput="debounce()">
      </div>
      <label style="font-size:12px;color:var(--muted);white-space:nowrap">Ordenar:</label>
      <select id="f-orden" onchange="loadProducts()">
        <option value="precio_min_asc">Precio ↑</option>
        <option value="precio_min_desc">Precio ↓</option>
        <option value="estrellas_desc">Más estrellas</option>
        <option value="ta_rating">Mejor valorado</option>
        <option value="nombre">Nombre A-Z</option>
      </select>
      <span class="result-count" id="result-count"></span>
    </div>

    <div id="products-container">
      <div class="loading"><div class="spinner"></div><br>Cargando…</div>
    </div>

    <div class="pagination" id="pagination"></div>
  </main>
</div>

<!-- MODAL CALENDARIO -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2 id="modal-title">Calendario de precios</h2>
    <div class="modal-sub" id="modal-sub"></div>
    <div class="modal-controls">
      <select id="modal-origen" onchange="loadCalendar()">
        <option value="MAD">Madrid</option>
        <option value="BCN">Barcelona</option>
        <option value="BIO">Bilbao</option>
        <option value="SVQ">Sevilla</option>
        <option value="VLC">Valencia</option>
        <option value="AGP">Málaga</option>
        <option value="ALC">Alicante</option>
      </select>
      <select id="modal-noches" onchange="loadCalendar()">
        <option value="">Todas las noches</option>
        <option value="3">3 noches</option>
        <option value="5">5 noches</option>
        <option value="7">7 noches</option>
      </select>
    </div>
    <div id="cal-grid" class="cal-grid"></div>
  </div>
</div>

<script>
  let currentPage = 1, totalPages = 1, debounceTimer = null;
  let currentProductId = null, currentProductName = null;

  window.addEventListener("DOMContentLoaded", () => {
    loadStats();
    loadFiltros();
    loadProducts();
  });

  function loadAll() { loadStats(); loadProducts(); }

  async function loadStats() {
    const r = await fetch("/api/stats").then(r => r.json());
    document.getElementById("st-hoteles").textContent = r.productos ?? "—";
    document.getElementById("st-precios").textContent = r.total_precios?.toLocaleString("es") ?? "—";
    document.getElementById("st-min").textContent     = r.precio_min ? r.precio_min + "€" : "—";
    document.getElementById("st-med").textContent     = r.precio_medio ? r.precio_medio + "€" : "—";
    document.getElementById("last-update").textContent = "Actualizado: " + new Date().toLocaleTimeString("es-ES");
  }

  async function loadFiltros() {
    const data = await fetch("/api/filtros").then(r => r.json());
    populateSelect("f-pais",     data.paises);
    populateSelect("f-region",   data.regiones);
    populateSelect("f-estrellas",data.estrellas.map(e => ({v: e, l: e + "★"})));
    populateSelect("f-noches",   data.noches.map(n => ({v: n, l: n + " noches"})));
    populateSelect("f-pension",  data.pensiones);

    const sel = document.getElementById("f-origen");
    for (const o of data.origenes) {
      const opt = new Option(o.label, o.code);
      sel.add(opt);
    }
  }

  function populateSelect(id, values) {
    const sel = document.getElementById(id);
    while (sel.options.length > 1) sel.remove(1);
    for (const v of values) {
      if (typeof v === "object" && v.v !== undefined) sel.add(new Option(v.l, v.v));
      else sel.add(new Option(v, v));
    }
  }

  function buildParams() {
    const p = new URLSearchParams();
    const g = id => document.getElementById(id)?.value || "";
    if (g("f-origen"))      p.set("origen",      g("f-origen"));
    if (g("f-noches"))      p.set("noches",      g("f-noches"));
    if (g("f-pension"))     p.set("pension",     g("f-pension"));
    if (g("f-pais"))        p.set("pais",        g("f-pais"));
    if (g("f-region"))      p.set("region",      g("f-region"));
    if (g("f-estrellas"))   p.set("estrellas",   g("f-estrellas"));
    if (g("f-precio_min"))  p.set("precio_min",  g("f-precio_min"));
    if (g("f-precio_max"))  p.set("precio_max",  g("f-precio_max"));
    if (g("f-fecha_desde")) p.set("fecha_desde", g("f-fecha_desde"));
    if (g("f-fecha_hasta")) p.set("fecha_hasta", g("f-fecha_hasta"));
    if (g("t-search"))      p.set("q",           g("t-search"));
    if (g("f-orden"))       p.set("orden",       g("f-orden"));
    p.set("page",     currentPage);
    p.set("per_page", 40);
    return p;
  }

  async function loadProducts() {
    const container = document.getElementById("products-container");
    container.innerHTML = '<div class="loading"><div class="spinner"></div><br>Cargando…</div>';
    const data = await fetch("/api/productos?" + buildParams()).then(r => r.json());
    totalPages = data.pages || 1;
    document.getElementById("result-count").textContent =
      (data.total || 0) + " resultado" + (data.total === 1 ? "" : "s");

    if (!data.items?.length) {
      container.innerHTML = '<div class="empty"><div class="icon">🏖️</div><p>Sin resultados con estos filtros.</p></div>';
      renderPagination(); return;
    }

    const grid = document.createElement("div");
    grid.className = "grid";
    for (const p of data.items) grid.appendChild(renderCard(p));
    container.innerHTML = "";
    container.appendChild(grid);
    renderPagination();
  }

  function renderCard(p) {
    const div = document.createElement("div");
    div.className = "card";

    const stars = p.estrellas ? "★".repeat(p.estrellas) : "";
    const ta    = p.tripadvisor_rating ? `⭐ ${p.tripadvisor_rating} (${p.tripadvisor_reviews})` : "";
    const destino = [p.resort, p.region, p.pais].filter(Boolean).join(", ");
    const topics  = (p.topics || []).slice(0,3).map(t => `<span class="topic">${esc(t)}</span>`).join("");

    let priceHtml = "";
    if (p.precio_actual) {
      priceHtml = `
        <div class="price-block">
          <div class="desde">Desde ${esc(p.mejor_origen_label || "")} · ${p.mejor_noches || ""}n</div>
          <div class="price-main">${Math.round(p.precio_actual)}€</div>
          <div class="price-sub">${esc(p.mejor_pension || "")} · ${esc(p.mejor_fecha || "")}</div>
        </div>`;
    } else {
      priceHtml = `<div class="price-block"><div class="price-main" style="font-size:14px;color:var(--muted)">Sin precio</div></div>`;
    }

    div.innerHTML = `
      <div class="card-img">
        ${p.foto_url ? `<img src="${esc(p.foto_url)}" loading="lazy" alt="" onerror="this.style.display='none'">` : ""}
        ${stars ? `<span class="stars">${stars}</span>` : ""}
        ${ta    ? `<span class="ta-badge">${ta}</span>` : ""}
      </div>
      <div class="card-body">
        <div class="card-name">${esc(p.nombre)}</div>
        <div class="card-dest">📍 ${esc(destino)}</div>
        ${topics ? `<div class="card-topics">${topics}</div>` : ""}
      </div>
      <div class="card-footer">
        ${priceHtml}
        <div>
          <button class="cal-btn" onclick="openCalendar('${p.id}', '${esc(p.nombre)}', '${p.mejor_origen || 'MAD'}')">📅</button>
          <a href="${esc(p.url)}" target="_blank" class="card-btn">Ver →</a>
        </div>
      </div>
    `;
    return div;
  }

  // ── Calendario modal ─────────────────────────────────────────
  function openCalendar(id, nombre, origen) {
    currentProductId   = id;
    currentProductName = nombre;
    document.getElementById("modal-title").textContent = nombre;
    document.getElementById("modal-sub").textContent   = "Precios por fecha de salida";
    document.getElementById("modal-origen").value      = origen || "MAD";
    document.getElementById("modal-overlay").classList.add("open");
    loadCalendar();
  }

  function closeModal(e) {
    if (!e || e.target === document.getElementById("modal-overlay")) {
      document.getElementById("modal-overlay").classList.remove("open");
    }
  }

  async function loadCalendar() {
    const origen = document.getElementById("modal-origen").value;
    const noches = document.getElementById("modal-noches").value;
    const grid   = document.getElementById("cal-grid");
    grid.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

    const params = new URLSearchParams({ origen });
    if (noches) params.set("noches", noches);

    const data = await fetch(`/api/calendario/${currentProductId}?${params}`).then(r => r.json());

    if (!data.length) {
      grid.innerHTML = '<div style="color:var(--muted);padding:20px;text-align:center">Sin precios disponibles para este origen.</div>';
      return;
    }

    // Calcular rango para colorear
    const prices = data.map(r => r.precio);
    const minP   = Math.min(...prices);
    const maxP   = Math.max(...prices);
    const range  = maxP - minP || 1;

    grid.innerHTML = "";
    for (const r of data) {
      const pct  = (r.precio - minP) / range;
      const cls  = pct < 0.33 ? "cheap" : pct < 0.66 ? "mid" : "expensive";
      const date = new Date(r.fecha_salida + "T00:00:00Z");
      const label = date.toLocaleDateString("es-ES", { day: "2-digit", month: "short" });

      const cell = document.createElement("div");
      cell.className = `cal-cell ${cls}`;
      cell.innerHTML = `
        <div class="date">${label}</div>
        <div class="price">${Math.round(r.precio)}€</div>
        <div class="nights">${r.noches}n · ${r.pension || ""}</div>
      `;
      grid.appendChild(cell);
    }
  }

  // ── Pagination ────────────────────────────────────────────────
  function renderPagination() {
    const el = document.getElementById("pagination");
    if (totalPages <= 1) { el.innerHTML = ""; return; }
    const btns = [];
    btns.push(`<button onclick="goPage(${currentPage-1})" ${currentPage===1?"disabled":""}>‹</button>`);
    for (let i = 1; i <= totalPages; i++) {
      if (i===1 || i===totalPages || Math.abs(i-currentPage)<=2)
        btns.push(`<button class="${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`);
      else if (Math.abs(i-currentPage)===3) btns.push(`<span style="padding:0 4px">…</span>`);
    }
    btns.push(`<button onclick="goPage(${currentPage+1})" ${currentPage===totalPages?"disabled":""}>›</button>`);
    el.innerHTML = btns.join("");
  }

  function goPage(p) {
    if (p<1||p>totalPages) return;
    currentPage = p; loadProducts();
    window.scrollTo({top:0,behavior:"smooth"});
  }

  function debounce() {
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(() => { currentPage=1; loadProducts(); }, 350);
  }

  function resetFilters() {
    ["f-origen","f-noches","f-pension","f-pais","f-region","f-estrellas","f-orden"].forEach(id => {
      const el = document.getElementById(id); if (el) el.value = "";
    });
    ["t-search","f-precio_min","f-precio_max","f-fecha_desde","f-fecha_hasta"].forEach(id => {
      const el = document.getElementById(id); if (el) el.value = "";
    });
    currentPage = 1; loadProducts();
  }

  function esc(s) {
    return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }
</script>
</body>
</html>
